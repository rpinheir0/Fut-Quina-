<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <g filter="url(#shadow)">
    <circle cx="50" cy="50" r="44" fill="#62d154" stroke="#449e37" stroke-width="2.5" />
    
    <!-- Reflexo suave no topo esquerdo -->
    <path d="M 15 35 Q 40 10 70 20 A 44 44 0 0 0 15 35" fill="#ffffff" opacity="0.15" />
    
    <!-- Linhas cruzadas (X) -->
    <line x1="18.8" y1="18.8" x2="81.2" y2="81.2" stroke="#4aa63e" stroke-width="2.5" />
    <line x1="81.2" y1="18.8" x2="18.8" y2="81.2" stroke="#4aa63e" stroke-width="2.5" />
  </g>
</svg>
